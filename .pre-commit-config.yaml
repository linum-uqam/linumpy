repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-format
        exclude: ^\.planning/
      - id: ruff
        args: [--fix]
        exclude: ^\.planning/
  - repo: local
    hooks:
      - id: ty
        name: ty (type check)
        entry: uv run --frozen ty check
        language: system
        types: [python]
        files: ^(linumpy|scripts)/
        pass_filenames: false
        # Blocking — zero-error baseline enforced in CI and pre-commit.
        verbose: true
