[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "linumpy"
version = "0.1.1"
description = "linumpy: microscopy tools and utilities"
readme = "README.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.12"
authors = [
    { name = "The LINUM developers" },
]
maintainers = [
    { name = "Joël Lefebvre", email = "lefebvre.joel@uqam.ca" },
]
classifiers = [
    "Development Status :: 1 - Planning",
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "numpy<2.3",
    "scipy<1.13",
    "scikit-image",
    "scikit-learn",
    "matplotlib",
    "pandas",
    "nibabel",
    "dipy",
    "dask>=2024.10.0",
    "SimpleITK",
    "tqdm",
    "pqdm",
    "hyperactive<=4.8.0",
    "basicpy",
    "jax<=0.4.23",
    "jaxlib<=0.4.23",
    "zarr>=3.0.10",
    "ome-zarr>=0.9.0",
    "napari",
    "napari-ome-zarr",
    "pynrrd==1.1.3",
    "numcodecs<0.16",
    "threadpoolctl",
]

[project.urls]
Homepage = "https://github.com/linum-uqam/linumpy"
Repository = "https://github.com/linum-uqam/linumpy"

[project.optional-dependencies]
gpu = [
    "cupy-cuda12x>=12.0.0",
    "jax<=0.4.23",
    "jaxlib==0.4.23",
    "jax-cuda12-plugin==0.4.23; sys_platform == 'linux'",
    "nvidia-cublas-cu12>=12.2.5.6; sys_platform == 'linux'",
    "nvidia-cuda-cupti-cu12>=12.2.142; sys_platform == 'linux'",
    "nvidia-cuda-nvcc-cu12>=12.2.140; sys_platform == 'linux'",
    "nvidia-cuda-runtime-cu12>=12.2.140; sys_platform == 'linux'",
    "nvidia-cudnn-cu12>=8.9; sys_platform == 'linux'",
    "nvidia-cufft-cu12>=11.0.8.103; sys_platform == 'linux'",
    "nvidia-cusolver-cu12>=11.5.2; sys_platform == 'linux'",
    "nvidia-cusparse-cu12>=12.1.2.141; sys_platform == 'linux'",
    "nvidia-nccl-cu12>=2.18.3; sys_platform == 'linux'",
    "nvidia-nvjitlink-cu12>=12.2; sys_platform == 'linux'",
]
gpu-cuda13 = [
    "cupy-cuda13x>=13.0.0",
    "jax==0.4.23",
    "jaxlib==0.4.23; sys_platform != 'linux'",
    "nvidia-cublas-cu12>=12.2.5.6; sys_platform == 'linux'",
    "nvidia-cuda-cupti-cu12>=12.2.142; sys_platform == 'linux'",
    "nvidia-cuda-runtime-cu12>=12.2.140; sys_platform == 'linux'",
    "nvidia-cudnn-cu12>=8.9; sys_platform == 'linux'",
    "nvidia-cufft-cu12>=11.0.8.103; sys_platform == 'linux'",
    "nvidia-cusolver-cu12>=11.5.2; sys_platform == 'linux'",
    "nvidia-cusparse-cu12>=12.1.2.141; sys_platform == 'linux'",
    "nvidia-nccl-cu12>=2.18.3; sys_platform == 'linux'",
    "nvidia-nvjitlink-cu12>=12.2; sys_platform == 'linux'",
]
docs = [
    "sphinx>=6.0.0",
    "sphinx-rtd-theme>=1.0.0",
]

[project.scripts]
"linum_aip.py" = "scripts.linum_aip:main"
"linum_align_mosaics_3d_from_shifts.py" = "scripts.linum_align_mosaics_3d_from_shifts:main"
"linum_apply_slices_transforms.py" = "scripts.linum_apply_slices_transforms:main"
"linum_axis_XYZ_to_ZYX.py" = "scripts.linum_axis_XYZ_to_ZYX:main"
"linum_clip_percentile.py" = "scripts.linum_clip_percentile:main"
"linum_compensate_attenuation.py" = "scripts.linum_compensate_attenuation:main"
"linum_compensate_illumination.py" = "scripts.linum_compensate_illumination:main"
"linum_compensate_psf_from_model.py" = "scripts.linum_compensate_psf_from_model:main"
"linum_compensate_psf_model_free.py" = "scripts.linum_compensate_psf_model_free:main"
"linum_compute_attenuation_bias_field.py" = "scripts.linum_compute_attenuation_bias_field:main"
"linum_compute_attenuation.py" = "scripts.linum_compute_attenuation:main"
"linum_convert_bin_to_nii.py" = "scripts.linum_convert_bin_to_nii:main"
"linum_convert_nifti_to_nrrd.py" = "scripts.linum_convert_nifti_to_nrrd:main"
"linum_convert_nifti_to_zarr.py" = "scripts.linum_convert_nifti_to_zarr:main"
